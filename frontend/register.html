<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="/frontend/styles.css">
</head>
<body>
<div class="auth-shell">
    <div class="auth-card">
        <h1>Create Your Account</h1>
        <p>Register to browse local crops, add producers, and manage farm inventory with ease.</p>

        <form id="registerForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <div class="auth-actions">
                <a href="/" class="link-button">Back to login</a>
                <button type="submit" class="button button-primary">Register</button>
            </div>
        </form>
        <p class="footer-note">Join your farming community with a polished and responsive dashboard.</p>
    </div>
</div>
<script src="/frontend/register.js"></script>
</body>
</html>
