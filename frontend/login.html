<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/frontend/styles.css">
</head>
<body>
<div class="auth-shell">
    <div class="auth-card">
        <h1>Welcome Back</h1>
        <p>Sign in to manage farm listings, orders, and inventory through the dashboard.</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <div class="auth-actions">
                <a href="/register" class="link-button">Create account</a>
                <button type="submit" class="button button-primary">Login</button>
            </div>
        </form>
        <p class="footer-note">A modern farm management portal for buyers and admins.</p>
    </div>
</div>
<script src="/frontend/login.js"></script>
</body>
</html>
