<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard</title>
    <link rel="stylesheet" href="/frontend/styles.css">
</head>
<body>
<div class="page-shell">
    <header class="topbar">
        <div class="brand">Farm Manager</div>
        <div class="topnav">
            <span class="badge">User Dashboard</span>
            <span class="badge-soft">Shop fresh crops</span>
        </div>
    </header>

    <section class="page-intro">
        <div>
            <h1>Browse Crops & Orders</h1>
            <p>Explore available produce, add items to your cart, and place orders from local farmers.</p>
        </div>
    </section>

    <div class="grid grid-2">
        <div class="card">
            <div class="section-title"><h2>Available Crops</h2></div>
            <div id="cropList" class="list-grid"></div>
        </div>

        <div class="card">
            <div class="section-title"><h2>Your Cart</h2></div>
            <div id="cartList" class="list-grid"></div>
            <div class="card-actions">
                <button onclick="placeOrder()" class="button button-primary">Place Order</button>
            </div>
        </div>
    </div>
</div>
<script src="/frontend/user.js"></script>
</body>
</html>
