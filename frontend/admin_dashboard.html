<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <link rel="stylesheet" href="/frontend/styles.css">

    <style>

        body{
            margin:0;
            font-family:Poppins,sans-serif;
            background:#f4f7f2;
        }

        .page-shell{
            padding:30px;
        }

        .topbar{
            background:linear-gradient(135deg,#0f9b0f,#1e7d32);
            color:white;
            padding:20px 30px;
            border-radius:20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            box-shadow:0 10px 25px rgba(0,0,0,0.1);
        }

        .brand{
            font-size:28px;
            font-weight:bold;
        }

        .badge{
            background:white;
            color:#1e7d32;
            padding:10px 18px;
            border-radius:30px;
            font-weight:600;
        }

        .page-intro{
            margin-top:30px;
            margin-bottom:20px;
        }

        .page-intro h1{
            font-size:40px;
            color:#1e293b;
            margin-bottom:10px;
        }

        .page-intro p{
            color:#64748b;
            font-size:18px;
        }

        .grid{
            display:grid;
            gap:25px;
        }

        .grid-2{
            grid-template-columns:1fr 1fr;
        }

        .card{
            background:white;
            padding:25px;
            border-radius:20px;
            box-shadow:0 10px 25px rgba(0,0,0,0.08);
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-5px);
        }

        h2{
            margin-bottom:20px;
            color:#166534;
        }

        input,
        select{
            width:100%;
            padding:14px;
            border-radius:12px;
            border:1px solid #d1d5db;
            margin-bottom:15px;
            font-size:16px;
            outline:none;
        }

        input:focus,
        select:focus{
            border-color:#16a34a;
            box-shadow:0 0 10px rgba(22,163,74,0.2);
        }

        .button{
            border:none;
            padding:14px 24px;
            border-radius:14px;
            cursor:pointer;
            font-size:16px;
            font-weight:600;
            transition:0.3s;
        }

        .button-primary{
            background:linear-gradient(135deg,#16a34a,#15803d);
            color:white;
        }

        .button-primary:hover{
            transform:scale(1.05);
        }

        .button-secondary{
            background:#ef4444;
            color:white;
        }

        .button-secondary:hover{
            transform:scale(1.05);
        }

        .list-grid{
            display:grid;
            gap:18px;
        }

        .card-item{
            background:#f8fafc;
            padding:18px;
            border-radius:16px;
            border:1px solid #e2e8f0;
        }

        .card-item h3{
            margin:10px 0;
            color:#0f172a;
        }

        .inline-meta{
            display:flex;
            justify-content:space-between;
            margin-bottom:8px;
            color:#475569;
            font-size:14px;
        }

        .card-actions{
            display:flex;
            gap:10px;
            margin-top:15px;
        }

        @media(max-width:900px){

            .grid-2{
                grid-template-columns:1fr;
            }

            .page-intro h1{
                font-size:30px;
            }
        }

    </style>

</head>

<body>

<div class="page-shell">

    <header class="topbar">

        <div class="brand">
            🌾 Farm Manager
        </div>

        <div class="topnav">
            <span class="badge">
                Admin Dashboard
            </span>
        </div>

    </header>

    <section class="page-intro">

        <h1>
            Admin Control Center
        </h1>

        <p>
            Manage farmers, crops and farm expenses with a smart agricultural dashboard.
        </p>

    </section>

    <div class="grid grid-2">

        <!-- FARMER SECTION -->

        <div class="card">

            <h2>Add Farmer</h2>

            <form id="farmerForm">

                <input
                    type="text"
                    id="farmer_name"
                    placeholder="Enter Farmer Name"
                    required
                >

                <button
                    type="submit"
                    class="button button-primary"
                >
                    Add Farmer
                </button>

            </form>

            <br>

            <h2>Farmers List</h2>

            <div
                id="farmerList"
                class="list-grid"
            ></div>

        </div>

        <!-- CROP SECTION -->

        <div class="card">

            <h2>Add Crop</h2>

            <form id="cropForm">

                <input
                    type="text"
                    id="crop_name"
                    placeholder="Enter Crop Name"
                    required
                >

                <input
                    type="number"
                    id="quantity"
                    placeholder="Enter Quantity"
                    required
                >

                <input
                    type="number"
                    id="price"
                    placeholder="Enter Price"
                    required
                >

                <select id="farmer_id" required>

                    <option value="">
                        Select Farmer
                    </option>

                </select>

                <button
                    type="submit"
                    class="button button-primary"
                >
                    Add Crop
                </button>

            </form>

            <br>

            <h2>Crop Inventory</h2>

            <div
                id="cropList"
                class="list-grid"
            ></div>

        </div>

    </div>

    <br>

    <!-- EXPENSES SECTION -->

    <div class="card">

        <h2>Expenses Management</h2>

        <form id="expenseForm">

            <input
                type="text"
                id="expense_name"
                placeholder="Expense Name"
                required
            >

            <input
                type="number"
                id="expense_amount"
                placeholder="Expense Amount"
                required
            >

            <button
                type="submit"
                class="button button-primary"
            >
                Add Expense
            </button>

        </form>

        <br>

        <h2>Expenses List</h2>

        <div
            id="expenseList"
            class="list-grid"
        ></div>

    </div>

</div>

<script src="/frontend/admin.js"></script>

</body>
</html>
